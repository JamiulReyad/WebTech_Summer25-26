<!DOCTYPE html>
<html lang="en-US">
<head>
    <meta charset="UTF-8">
    <title>Signup</title>
</head>
<body>
    <div class="container">

    
    <h1>User Registration Form</h1>

    <form>
        <fieldset>
            <legend>Personal Information </legend>
        <table>
            <tr>
                <td><label for="firstName">First Name*</label></td>
                <td>
                    <input type="text" id="firstName" name="firstName">
                </td>
            </tr>

            <tr>
                <td><label for="lastName">Last Name*</label></td>
                <td>
                    <input type="text" id="lastName" name="lastName">
                </td>
            </tr>


            <tr>
                <td><label for="DOB">Date of birth*:</label></td>
                <td> <input type="date" id="DOB" name="DOB"></td>
            </tr>

            <tr>
                <td> Gender*</td>
                <td>
                    <input type="radio" id="PatientMale" name="Gender" value="Male">
                    <label for="PatientMale">Male</label>
                    <input type="radio" id="PatientFemale" name="Gender" value="Female">
                    <label for="PatientFemale">Female</label>
                    <input type="radio" id="PatientOther" name="Gender" value="Other">
                    <label for="PatientOther">Other</label>
                </td>
            </tr>



        </table>
        </fieldset>

        
        
        
        
        <fieldset>
            <legend>Contact Information</legend>
            <table>
               

                <tr>
                        <td><label for="PatientEmail">Email Address* </label></td>
                        <td><input type="email" id="PatientEmail" name="PatientEmail" ></td>
                </tr>

                 <tr>
                        <td><label for="PatientEmail">Phone Number* </label></td>
                        <td><input type="email" id="PatientEmail" name="PatientEmail"></td>
                </tr>

                <tr>
                    <td><label for="Address"> Address</label></td>
                    <td><textarea id="Address" name="Address" rows="3" cols="20" Style= "resize:none" placeholder="Enter your full address"></textarea></td>
                </tr>


            <tr>
                <td> <label for= "patientcitizen"> Country  </label></td>
                <td>
                    <select id="country"> 
                    <option id ="Default" value="Default"> ----- Select Country ----- </option>
                    <option id ="BD" value="Bangladesh"> Bangladesh </option>
                    <option id ="UK" value="UnitedKingdom"> United Kingdom </option>
                    <option id ="Brazil" value="Brazil"> Brazil </option>
                    </select>
                </td>
            </tr>


            </table>
        </fieldset>

        
        
        
        
        <fieldset>
            <legend>Account Information </legend>
            <table>
                <tr> 
                <td> <label for="username"> User Name* </label> </td>
                <td> <input type="text" id="username" name="username"> </td>
                </tr>
                <tr>
                    <td> <label for="password"> Password* </label> </td>
                    <td> <input type="password" id="password" name="password"> </td>
                </tr>

                <tr>
                    <td> <label for="Conpassword">Confirm  Password* </label> </td>
                    <td> <input type="Conpassword" id="Conpassword" name="Conpassword"> </td>
                </tr>
            </table>
        </fieldset>

        
        
        
        <fieldset>
            <legend> Preferences</legend>
            <table>

                <tr>
                <td> <label for="DeptDoctor"> Interest </label></td>
                <td>
                    <input type ="checkbox" id="Medicine" name="DeptDoctor">
                    <label for ="Medicine"> Sports </label>
                    
                    <input type ="checkbox" id="Cardiac" name="DeptDoctor">
                    <label for ="Cardiac"> Music </label>
                    <br>
                    <input type ="checkbox" id="Neorology" name="DeptDoctor">
                    <label for ="Neorology"> Reading </label>
                    
                    <input type ="checkbox" id="Neorology" name="DeptDoctor">
                    <label for ="Neorology"> Technology </label>

                </td>
            </tr>


            <tr><td> <input type="checkbox" id="Condition" name="Condition">
                     <label for="Condition"> <font color= "black"> I Agree to the Terms and Condition * </font></label> 
            </td></tr>
            
       
            </table>
        </fieldset>
       
        
        
        <input type="submit" id="submit" name="submit" value="Register">
        <input type="reset" id="reset" name="reset" value="Clear Form">
        
            
        
    </form>
</div>
</body>
</html>
